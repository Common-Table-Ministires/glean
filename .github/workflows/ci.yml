name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test

  build-ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: cd ios && xcodegen generate

      - name: Build Glean for iOS Simulator
        run: |
          cd ios
          xcodebuild -project Glean.xcodeproj -scheme Glean \
            -destination 'generic/platform=iOS Simulator' -configuration Debug build
