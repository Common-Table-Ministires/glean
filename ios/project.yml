name: Glean
options:
  bundleIdPrefix: org.commontableministries
  deploymentTarget:
    iOS: "17.0"
packages:
  ScriptureCore:
    path: ../
  # Integrity: selection brain is a sibling package, never vendored into Glean sources.
  GleanSelection:
    path: ../../../Desktop/biblealgo
  # Integrity: open commentary pack — not copied into app sources.
  GleanCommentary:
    path: ../../gleancommentary
targets:
  Glean:
    type: application
    platform: iOS
    sources:
      - path: Glean
    resources:
      - path: Glean/Resources
    dependencies:
      - package: ScriptureCore
        product: ScriptureCore
      - package: GleanSelection
        product: GleanSelection
      - package: GleanCommentary
        product: GleanCommentary
      - sdk: libsqlite3.tbd
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.commontableministries.glean
        MARKETING_VERSION: "0.1.9"
        CURRENT_PROJECT_VERSION: "19"
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: "Glean"
        GENERATE_INFOPLIST_FILE: "YES"
        CODE_SIGN_STYLE: Automatic
        # Personal team for on-device debug; switch to CTM org for store release.
        DEVELOPMENT_TEAM: TMYF9PC8GV
